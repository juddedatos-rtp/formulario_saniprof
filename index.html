<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Cierre de Circuito</title>

<style>
body{
  margin:0;
  background: linear-gradient(135deg, #4facfe, #43e97b);
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

form{
  background:#fff;
  padding:25px;
  border-radius:15px;
  width:100%;
  max-width:500px;
}

input, select, textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#2c7be5;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<form id="formulario">

<h3>🚍 Cierre de Circuito</h3>

<label>Cierre</label>
<select name="entry.2037866813">
  <option>Hidalgo</option>
  <option>Reclusorio Norte</option>
  <option>El Charco</option>
</select>

<label>Horario</label>
<select name="entry.1566385644">
  <option>Matutino</option>
  <option>Vespertino</option>
  <option>Nocturno</option>
</select>

<label>Trabajador</label>
<input name="entry.1857890296">

<label>Insumos</label>
<label><input type="checkbox" name="entry.1245624590" value="Papel de baño"> Papel de baño</label>
<label><input type="checkbox" name="entry.1245624590" value="Gel Antibacterial"> Gel Antibacterial</label>
<label><input type="checkbox" name="entry.1245624590" value="Jabon"> Jabon</label>

<label>Observaciones</label>
<textarea name="entry.1928307145"></textarea>

<button type="submit">Enviar</button>

</form>

<script>
document.getElementById("formulario").addEventListener("submit", function(e){
  e.preventDefault();

  let data = new FormData(this);

  fetch("https://docs.google.com/forms/d/e/1FAIpQLSeXetqFhJncAIbs4fgoo1uZqz88nVw-VsCSN0fah9bBCwIQOw/formResponse", {
    method: "POST",
    mode: "no-cors",
    body: data
  })
  .then(() => {
    alert("✅ Datos guardados en Google Sheets");
    this.reset();
  })
  .catch(() => {
    alert("❌ Error al enviar");
  });
});
</script>

</body>
</html>
