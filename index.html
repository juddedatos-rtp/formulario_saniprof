<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Sanitarios</title>

<style>
*{
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
  margin:0;
  background: linear-gradient(135deg, #4facfe, #43e97b);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
}

.container{
  width:100%;
  max-width:520px;
}

h2{
  text-align:center;
  color:#fff;
  margin-bottom:15px;
}

form{
  background:#ffffff;
  padding:25px 20px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  width:100%;
}

.section-title{
  margin-top:20px;
  font-weight:600;
  font-size:15px;
  border-bottom:2px solid #f1f1f1;
  padding-bottom:6px;
  color:#333;
}

label{
  display:block;
  margin-top:14px;
  font-size:14px;
  color:#444;
}

select,
input,
textarea{
  width:100%;
  padding:11px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

.checkbox-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.checkbox-grid label{
  display:flex;
  align-items:center;
  gap:8px;
  background:#f8f9fa;
  padding:10px;
  border-radius:10px;
  border:1px solid #eee;
}

button{
  width:100%;
  margin-top:25px;
  padding:13px;
  background: linear-gradient(135deg, #2c7be5, #00c6ff);
  color:white;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>🚍 Registro de Sanitarios</h2>

<form id="formulario">

<div class="section-title">Datos Generales</div>

<label>Cierre de Circuito</label>
<select name="entry.1747926528" required>
  <option value="">Seleccionar</option>
  <option value="Hidalgo">Hidalgo</option>
  <option value="Reclusorio Norte">Reclusorio Norte</option>
  <option value="El Charco">El Charco</option>
</select>

<label>Horario</label>
<select name="entry.1846409222" required>
  <option value="">Seleccionar</option>
  <option value="Matutino">Matutino</option>
  <option value="Vespertino">Vespertino</option>
  <option value="Nocturno">Nocturno</option>
</select>

<label>Trabajador</label>
<input type="text" name="entry.2080763590" required>

<div class="section-title">Insumos Entregados</div>

<div class="checkbox-grid">
  <label>
    <input type="checkbox" name="entry.1968817159" value="Papel de baño">
    Papel de baño
  </label>
</div>

<div class="section-title">Observaciones</div>

<textarea name="entry.960830566"></textarea>

<button type="submit">Enviar</button>

</form>

</div>

<script>
document.getElementById("formulario").addEventListener("submit", function(e){
  e.preventDefault();

  let data = new FormData(this);

  fetch("https://docs.google.com/forms/d/e/1FAIpQLSdd7Sexi4TNefbAfxfHag5g7SJnQn0FX0x9RPrEUK_1Cc5Z3w/formResponse", {
    method: "POST",
    mode: "no-cors",
    body: data
  })
  .then(() => {
    alert("✅ Registro enviado correctamente. Verifica en Google Sheets.");
    this.reset();
  })
  .catch(() => {
    alert("❌ Error al enviar. Intenta nuevamente.");
  });
});
</script>

</body>
</html>
